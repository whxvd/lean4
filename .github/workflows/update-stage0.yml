name: Update stage0

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  update-stage0:
    runs-on: ubuntu-latest
    defaults:
      run:
        # like Linux release
        shell: nix develop .#oldGlibc -c bash -euxo pipefail {0}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPRESS: true
      CCACHE_MAXSIZE: 400M
    steps:
    # This action should push to an otherwise protected branch, so it
    # uses a deploy key with write permissions, as suggested at
    # https://stackoverflow.com/a/76135647/946226
    - uses: actions/checkout@v7
      with:
        ssh-key: ${{secrets.STAGE0_SSH_KEY}}
    - name: Setup git user
      shell: bash
      run: |
          git config --global user.name "Lean stage0 autoupdater"
          git config --global user.email "<>"
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
    - name: Open Nix shell once
      run: true
    - name: Set up NPROC
      run: |
        echo "NPROC=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)" >> $GITHUB_ENV
    - name: Restore Cache
      uses: actions/cache/restore@v5
      with:
        # NOTE: must be in sync with `restore-cache` in `build-template.yml`
        path: |
          .ccache
          build/stage1/**/*.trace
          build/stage1/**/*.olean*
          build/stage1/**/*.ilean
          build/stage1/**/*.ir
          build/stage1/**/*.c
          build/stage1/**/*.c.o*
        key: Linux release-build-v4-${{ github.sha }}
        # fall back to (latest) previous cache
        restore-keys: |
          Linux release-build-v4
    - name: Configure Build
      # sync options with `Linux release` to ensure cache reuse
      run: |
        mkdir -p build
        cd build
        wget -q https://github.com/leanprover/lean-llvm/releases/download/22.1.4/lean-llvm-x86_64-linux-gnu.tar.zst
        PREPARE="$(../script/prepare-llvm-linux.sh lean-llvm*)"
        eval "OPTIONS=($PREPARE)"
        cmake .. --preset release -B . -DWFAIL=ON -DLEAN_EXTRA_CXX_FLAGS=-Werror "${OPTIONS[@]}"
    - run: |
        make -j$NPROC -C build update-stage0-commit
    - run: git show --stat
    - run: git push origin
